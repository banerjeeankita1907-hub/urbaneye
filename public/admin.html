<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UrbanEye Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark"><div class="container"><span class="navbar-brand">🏙️ UrbanEye Admin</span></div></nav>
  <div class="container mt-4">
    <h2>Dashboard Overview</h2>
    <div class="row mt-4" id="statsCards"></div>
    <div class="row mt-4">
      <div class="col-md-6"><canvas id="categoryChart"></canvas></div>
      <div class="col-md-6"><canvas id="severityChart"></canvas></div>
    </div>
  </div>
  <script>
    async function loadDashboard() {
      const token = localStorage.getItem('token');
      if (!token) return window.location.href = '/';
      const res = await fetch('/api/dashboard', { headers: { 'Authorization': 'Bearer ' + token } });
      if (res.status === 403) { alert('Admin access only'); window.location.href = '/'; return; }
      const data = await res.json();
      document.getElementById('statsCards').innerHTML = `
        <div class="col-md-4"><div class="card text-white bg-primary mb-3"><div class="card-body"><h5>Total Issues</h5><h2>${data.total}</h2></div></div></div>
        <div class="col-md-4"><div class="card text-white bg-warning mb-3"><div class="card-body"><h5>Open</h5><h2>${data.open}</h2></div></div></div>
        <div class="col-md-4"><div class="card text-white bg-success mb-3"><div class="card-body"><h5>Resolved</h5><h2>${data.total - data.open}</h2></div></div></div>`;
      const catLabels = [], catCounts = [];
      for (let c in data.byCategory) { catLabels.push(c); catCounts.push(data.byCategory[c]); }
      new Chart(document.getElementById('categoryChart'), {
        type: 'pie', data: { labels: catLabels, datasets: [{ data: catCounts }] }
      });
      const sevLabels = [], sevCounts = [];
      for (let s in data.bySeverity) { sevLabels.push(s); sevCounts.push(data.bySeverity[s]); }
      new Chart(document.getElementById('severityChart'), {
        type: 'bar', data: { labels: sevLabels, datasets: [{ label: 'Count', data: sevCounts, backgroundColor: ['green','orange','red'] }] }
      });
    }
    loadDashboard();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UrbanEye – Community Issue Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">🏙️ UrbanEye</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#" id="loginBtn">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="#" id="registerBtn">Register</a></li>
          <li class="nav-item"><a class="nav-link" href="#" id="dashboardLink" style="display:none;" onclick="window.location.href='/admin.html'">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn" style="display:none;">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid mt-3">
    <div class="row">
      <div class="col-md-8">
        <div id="map"></div>
      </div>
      <div class="col-md-4">
        <div class="card mb-3">
          <div class="card-header bg-primary text-white">Report an Issue</div>
          <div class="card-body">
            <div id="reportLoginMsg" class="text-muted small mb-2">Please log in to report issues.</div>
            <form id="issueForm" style="display:none;" enctype="multipart/form-data">
              <div class="mb-3">
                <label for="desc" class="form-label">Description</label>
                <textarea class="form-control" id="desc" rows="3" required></textarea>
              </div>
              <div class="mb-3">
                <label for="category" class="form-label">Category</label>
                <select class="form-select" id="category" required>
                  <option value="">Select...</option>
                  <option value="road">Road / Pothole</option>
                  <option value="waste">Garbage / Waste</option>
                  <option value="water">Water / Drainage</option>
                  <option value="electricity">Electricity</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="photo" class="form-label">Photo (optional)</label>
                <input class="form-control" type="file" id="photo" accept="image/*">
              </div>
              <input type="hidden" id="latitude">
              <input type="hidden" id="longitude">
              <button type="submit" class="btn btn-success w-100">Submit Report</button>
            </form>
          </div>
        </div>
        <div class="card">
          <div class="card-header bg-secondary text-white">Recent Issues</div>
          <ul class="list-group list-group-flush" id="issueList" style="max-height:50vh; overflow-y:auto;"></ul>
        </div>
      </div>
    </div>
  </div>

  <!-- Auth Modal -->
  <div class="modal fade" id="authModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title" id="authModalTitle">Login</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body" id="authModalBody"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
